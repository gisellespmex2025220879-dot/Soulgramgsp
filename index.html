<!DOCTYPE html>
<html>
<head>
<title>Soulgram</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

textarea{
width:100%;
height:80px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
}

#debug{
margin-top:10px;
color:#333;
}
</style>

</head>

<body>

<h1>❤️ Soulgram</h1>

<textarea id="reflection" placeholder="Write something..."></textarea>
<br>
<button onclick="postReflection()">Post</button>

<p id="debug"></p>

<script>

const supabaseUrl = "https://tsjijeklkzydjfbbrvtr.supabase.co"

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzamlqZWtsa3p5ZGpmYmJydnRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODUxNzQsImV4cCI6MjA4ODU2MTE3NH0.jqeSC4CxDyBOxrpJCbPM-KqY78NbPPI0SjX06SJEOkM"

const { createClient } = supabase
const client = createClient(supabaseUrl, supabaseKey)

async function postReflection(){

document.getElementById("debug").innerText="Posting..."

let text = document.getElementById("reflection").value

const { error } = await client
.from("Soulgram")
.insert({ content: text })

if(error){
document.getElementById("debug").innerText = error.message
}else{
document.getElementById("debug").innerText = "Posted successfully ✅"
document.getElementById("reflection").value=""
}

}

</script>

</body>
</html>
